<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: linear-gradient(135deg, #f0fdf4 0%, #e8f5e9 50%, #e0f2f1 100%);
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
      }
      .container {
        text-align: center;
        z-index: 20;
        padding: 2rem;
        position: relative;
      }
      h1 {
        font-size: 4rem;
        color: #2d6a4f;
        margin-bottom: 1rem;
        font-weight: 700;
        text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.5);
        animation: fadeInDown 0.8s ease-out;
      }
      p {
        font-size: 1.3rem;
        color: #40916c;
        margin-top: 1.5rem;
        animation: fadeInUp 0.8s ease-out 0.2s both;
      }
      .flower {
        position: fixed;
        animation: float 6s ease-in-out infinite;
        pointer-events: none;
      }
      .flower1 {
        top: 2%;
        left: 1%;
        font-size: 3.5rem;
        color: #52b788;
        animation:
          float 6s ease-in-out infinite,
          spin 8s linear infinite;
      }
      .flower2 {
        top: 5%;
        right: 1%;
        font-size: 4rem;
        color: #74c69d;
        animation: float 7s ease-in-out infinite 0.5s;
      }
      .flower3 {
        bottom: 5%;
        left: 1%;
        font-size: 3rem;
        color: #95d5b2;
        animation: float 8s ease-in-out infinite 1s;
      }
      .flower4 {
        bottom: 2%;
        right: 1%;
        font-size: 3.5rem;
        color: #52b788;
        animation: float 7s ease-in-out infinite 1.5s;
      }
      .flower5 {
        top: 45%;
        left: 0.5%;
        font-size: 2.5rem;
        color: #40916c;
        animation: float 6.5s ease-in-out infinite 0.3s;
      }
      .flower6 {
        top: 45%;
        right: 0.5%;
        font-size: 2.8rem;
        color: #74c69d;
        animation: float 7.5s ease-in-out infinite 1.2s;
      }
      @keyframes float {
        0%,
        100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-20px);
        }
      }
      @keyframes spin {
        0% {
          transform: translateY(0px) rotate(0deg);
        }
        50% {
          transform: translateY(-20px) rotate(180deg);
        }
        100% {
          transform: translateY(0px) rotate(360deg);
        }
      }
      @keyframes fadeInDown {
        from {
          opacity: 0;
          transform: translateY(-30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <svg class="flower flower1" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="15" fill="currentColor" opacity="0.8" />
      <circle cx="50" cy="20" r="12" fill="currentColor" />
      <circle cx="77" cy="35" r="12" fill="currentColor" />
      <circle cx="77" cy="65" r="12" fill="currentColor" />
      <circle cx="50" cy="80" r="12" fill="currentColor" />
      <circle cx="23" cy="65" r="12" fill="currentColor" />
      <circle cx="23" cy="35" r="12" fill="currentColor" />
    </svg>

    <svg class="flower flower2" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="18" fill="currentColor" opacity="0.7" />
      <circle cx="50" cy="15" r="14" fill="currentColor" />
      <circle cx="80" cy="30" r="14" fill="currentColor" />
      <circle cx="85" cy="65" r="14" fill="currentColor" />
      <circle cx="50" cy="85" r="14" fill="currentColor" />
      <circle cx="15" cy="65" r="14" fill="currentColor" />
      <circle cx="20" cy="30" r="14" fill="currentColor" />
    </svg>

    <svg class="flower flower3" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="12" fill="currentColor" opacity="0.9" />
      <circle cx="50" cy="25" r="10" fill="currentColor" />
      <circle cx="70" cy="40" r="10" fill="currentColor" />
      <circle cx="70" cy="60" r="10" fill="currentColor" />
      <circle cx="50" cy="75" r="10" fill="currentColor" />
      <circle cx="30" cy="60" r="10" fill="currentColor" />
      <circle cx="30" cy="40" r="10" fill="currentColor" />
    </svg>

    <svg class="flower flower4" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="16" fill="currentColor" opacity="0.75" />
      <circle cx="50" cy="18" r="13" fill="currentColor" />
      <circle cx="78" cy="32" r="13" fill="currentColor" />
      <circle cx="82" cy="63" r="13" fill="currentColor" />
      <circle cx="50" cy="82" r="13" fill="currentColor" />
      <circle cx="18" cy="63" r="13" fill="currentColor" />
      <circle cx="22" cy="32" r="13" fill="currentColor" />
    </svg>

    <svg class="flower flower5" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="11" fill="currentColor" opacity="0.85" />
      <circle cx="50" cy="28" r="9" fill="currentColor" />
      <circle cx="72" cy="39" r="9" fill="currentColor" />
      <circle cx="72" cy="61" r="9" fill="currentColor" />
      <circle cx="50" cy="72" r="9" fill="currentColor" />
      <circle cx="28" cy="61" r="9" fill="currentColor" />
      <circle cx="28" cy="39" r="9" fill="currentColor" />
    </svg>

    <svg class="flower flower6" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="14" fill="currentColor" opacity="0.8" />
      <circle cx="50" cy="22" r="11" fill="currentColor" />
      <circle cx="76" cy="34" r="11" fill="currentColor" />
      <circle cx="78" cy="64" r="11" fill="currentColor" />
      <circle cx="50" cy="78" r="11" fill="currentColor" />
      <circle cx="22" cy="64" r="11" fill="currentColor" />
      <circle cx="24" cy="34" r="11" fill="currentColor" />
    </svg>

    <div class="container">
      <h1>Welcome!</h1>
      <p>✨ I'm so glad you're here ✨</p>
    </div>
  </body>
</html>
